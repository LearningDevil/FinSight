# Define an upstream group (load balancer) named "finsight_backend"
# Requests will be distributed across three Node.js application servers
upstream finsight_backend {
    server node-app-1:3000;
    server node-app-2:3000;
    server node-app-3:3000;
}

# Define rate limiting zones
# "api_limit": 100 requests per minute per client IP
# "ai_limit": 10 requests per minute per client IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/m;

server {
    listen 80;  # Listen for HTTP traffic on port 80

    # Location block for AI policy analysis endpoint
    location /api/policies/analyze {
        # Apply stricter rate limit for AI analysis requests
        limit_req zone=ai_limit burst=5 nodelay;

        # Forward requests to the backend pool
        proxy_pass http://finsight_backend;
        proxy_http_version 1.1;

        # Required headers for WebSocket and proper proxying
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-Ip $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Limit maximum request body size (e.g., file uploads)
        client_max_body_size 10M;
    }

    # Location block for general API endpoints
    location /api/ {
        # Apply standard rate limit for API requests
        limit_req zone=api_limit burst=20 nodelay;

        # Forward requests to the backend pool
        proxy_pass http://finsight_backend;
        proxy_http_version 1.1;

        # Required headers for WebSocket and proper proxying
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-Ip $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Limit maximum request body size
        client_max_body_size 10M;
    }

    # Location block for all other requests (e.g., frontend assets, root path)
    location / {
        proxy_pass http://finsight_backend;
        proxy_http_version 1.1;

        # Preserve original host and client IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-Ip $remote_addr;
    }
}
